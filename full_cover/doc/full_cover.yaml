# Global file/folder exclusions applied to every package.
# Entries can be plain glob strings or a pattern+except block.
global_excludes:
  - "**/*.g.dart"               # exclude all generated files
  - "**/*.freezed.dart"
#   - pattern: "**/ui/**"         # exclude ui folders...
#     except:
#       - "**_bloc.dart"          # ...but keep blocs inside them

# Per-package exclusions (glob pattern on the package path).
# Omitting or leaving excludes empty skips the entire package (**).
# package_excludes:
#   - package: "packages/testing" # skip entirely (no excludes key)
#   - package: "packages/sse"
#     excludes:
#       - pattern: "**"           # exclude everything...
#         except:
#           - "**/keep.dart"      # ...except keep.dart
#   - package: "packages/ui_components"
#     excludes:
#       - "lib/src/generated/**"  # plain glob string

cross_package_coverage: true      # default. Include hits on sibling local packages recorded during each package's test run.

output:
  global: true                    # write merged lcov.info at output.directory/lcov.info
  directory: coverage             # base folder for coverage outputs

  html:
    global: true                  # generate a merged HTML report at output.directory/html.directory
    package: false                # also generate an HTML report inside each package's coverage/html
    directory: html               # HTML subfolder relative to output.directory

limits:
  line:
    minimum: 60                   # below this => red
    average: 80                   # below this => yellow, above => green
  branch:
    minimum: 60
    average: 80
  function:
    minimum: 60
    average: 80
